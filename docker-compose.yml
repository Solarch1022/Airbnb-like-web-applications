# Local development / integration-testing dependencies.
#
# Start just the database for local runs and integration tests:
#   docker compose up -d dynamodb-local
#
# Optionally run the API in a container too (talks to dynamodb-local):
#   docker compose up --build
services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: ddb-local
    # In-memory mode: fast and reset on restart (ideal for tests). Drop
    # "-inMemory" and mount a volume if you want data to persist.
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    ports:
      - "8000:8000"
    healthcheck:
      # DynamoDB Local returns HTTP 400 to a bare GET, which still proves it is
      # up and listening.
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/8000 && echo -e 'GET / HTTP/1.0\\r\\n\\r\\n' >&3 && head -n 1 <&3",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      ENVIRONMENT: "development"
      AWS_REGION: "us-east-1"
      DYNAMODB_TABLE_NAME: "items"
      DYNAMODB_ENDPOINT_URL: "http://dynamodb-local:8000"
      AUTO_CREATE_TABLE: "true"
      # DynamoDB Local ignores credentials, but boto3 requires them to be set.
      AWS_ACCESS_KEY_ID: "local"
      AWS_SECRET_ACCESS_KEY: "local"
    ports:
      - "8080:8000"
    profiles:
      # Only starts when explicitly requested (e.g. `docker compose --profile api up`),
      # so `docker compose up -d dynamodb-local` stays lightweight for tests.
      - api
